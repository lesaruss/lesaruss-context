<script>
  const sideToggle = document.getElementById('sideToggle');
  const drawerClose = document.getElementById('drawerClose');
  const drawer = document.getElementById('drawer');
  const scrim = document.getElementById('drawerScrim');
  function openDrawer() { drawer.classList.add('open'); scrim.classList.add('open'); sideToggle?.setAttribute('aria-expanded','true'); }
  function closeDrawer() { drawer.classList.remove('open'); scrim.classList.remove('open'); sideToggle?.setAttribute('aria-expanded','false'); }
  sideToggle?.addEventListener('click', openDrawer);
  drawerClose?.addEventListener('click', closeDrawer);
  scrim?.addEventListener('click', closeDrawer);
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDrawer(); });
  (function autoTheme(){
    try { const h = new Date().getHours(); document.documentElement.setAttribute('data-theme', (h >= 6 && h < 18) ? 'light' : 'dark'); } catch(e) {}
